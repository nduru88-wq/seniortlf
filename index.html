<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Senior tlf" />

  <title>Senior tlf</title>

  <!-- APP IKON -->
  <link rel="apple-touch-icon" sizes="180x180" href="telefon.png" />
  <link rel="apple-touch-icon" href="telefon.png" />
  <link rel="icon" href="telefon.png" />

  <style>

    :root{
      --bg:#0b1220;
      --card:rgba(255,255,255,.09);
      --card2:rgba(255,255,255,.14);

      --text:#fff;
      --muted:rgba(255,255,255,.75);

      --stroke:rgba(255,255,255,.14);

      --green:#27d17c;
      --green2:#1fb66c;

      --radius:34px;

      --shadow:
      0 18px 45px rgba(0,0,0,.4);
    }

    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      height:100%;

      font-family:
      system-ui,
      -apple-system,
      Segoe UI,
      Roboto,
      Helvetica,
      Arial;

      overscroll-behavior:none;
      touch-action:manipulation;
    }

    body{

      background:

      radial-gradient(
      900px 700px at 50% 0%,
      rgba(80,140,255,.25),
      transparent 55%
      ),

      radial-gradient(
      700px 500px at 50% 100%,
      rgba(0,255,170,.12),
      transparent 55%
      ),

      var(--bg);

      color:var(--text);

      overflow:hidden;
    }

    .app{

      width:100%;

      height:100dvh;

      padding:

      calc(
      18px + env(safe-area-inset-top)
      )

      18px

      calc(
      22px + env(safe-area-inset-bottom)
      );

      display:flex;

      justify-content:center;

      align-items:center;
    }

    .card{

      width:100%;

      max-width:430px;

      height:100%;

      max-height:820px;

      text-decoration:none;

      color:inherit;

      background:

      linear-gradient(
      180deg,
      var(--card2),
      var(--card)
      );

      border:

      1px solid
      var(--stroke);

      border-radius:
      var(--radius);

      box-shadow:
      var(--shadow);

      padding:22px;

      display:flex;

      flex-direction:column;

      align-items:center;

      justify-content:space-between;

      -webkit-tap-highlight-color:transparent;

      user-select:none;
    }

    .card:active{
      transform:scale(.985);
    }

    .topText{
      text-align:center;
      padding-top:8px;
    }

    h1{
      margin:0;

      font-size:
      clamp(
      32px,
      9vw,
      46px
      );

      font-weight:900;
    }

    .hint{

      margin-top:10px;

      color:var(--muted);

      font-size:
      clamp(
      16px,
      4vw,
      20px
      );
    }

    .photoWrap{

      width:
      min(
      78vw,
      330px
      );

      aspect-ratio:1;

      border-radius:999px;

      overflow:hidden;

      border:

      4px solid
      rgba(255,255,255,.22);

      box-shadow:
      0 16px 38px rgba(0,0,0,.38);

      background:
      rgba(255,255,255,.08);

      margin:18px 0;
    }

    .photoWrap img{

      width:100%;

      height:100%;

      object-fit:cover;

      display:block;
    }

    .phone{

      margin:0;

      text-align:center;

      font-weight:700;

      color:
      rgba(255,255,255,.82);

      font-size:
      clamp(
      18px,
      5vw,
      24px
      );
    }

    .callBtn{

      width:100%;

      margin-top:18px;

      border:0;

      border-radius:26px;

      padding:22px;

      background:

      linear-gradient(
      180deg,
      var(--green),
      var(--green2)
      );

      color:#062012;

      font-size:
      clamp(
      24px,
      7vw,
      34px
      );

      font-weight:900;

      display:flex;

      justify-content:center;

      align-items:center;

      gap:12px;

      box-shadow:
      0 14px 30px rgba(0,0,0,.35);
    }

    @media(max-height:700px){

      .card{
        padding:16px;
      }

      .photoWrap{
        width:min(62vw,260px);
      }

      .callBtn{
        padding:18px;
      }

    }

  </style>

</head>

<body>

<div class="app">

<a class="card"

href="tel:+4566550708"

aria-label="Ring til Finn">

<div class="topText">

<h1>Finn</h1>

<p class="hint">

Tryk på billedet for at ringe

</p>

</div>

<div class="photoWrap">

<img
src="finn.jpg"
alt="Finn">

</div>

<div>

<p class="phone">

+45 66 55 07 08

</p>

<div class="callBtn">

📞 Ring til Finn

</div>

</div>

</a>

</div>

<script>

document.addEventListener(
'gesturestart',
e=>e.preventDefault()
);

document.addEventListener(
'gesturechange',
e=>e.preventDefault()
);

document.addEventListener(
'gestureend',
e=>e.preventDefault()
);

let lastTouchEnd=0;

document.addEventListener(
'touchend',
function(e){

const now=Date.now();

if(
now-lastTouchEnd<=300
){
e.preventDefault();
}

lastTouchEnd=now;

},
{passive:false}
);

</script>

</body>
</html>
